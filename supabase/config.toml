# Webhook endpoints — called by external providers (Paystack, Stripe, Sendbird)
# with their own signature headers, NOT Supabase JWTs. Must skip platform-level
# JWT verification or every webhook request gets rejected with HTTP 401 before
# reaching the function code.

[functions.paystack-webhook]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false

[functions.sendbird-webhook]
verify_jwt = false

# Public booking-link resolver — called anonymously from the marketing/booking
# web page when a visitor opens https://aura-in-web.vercel.app/book/<slug>.
# No JWT required by design (guests have no auth session).

[functions.resolve-link]
verify_jwt = false

# Public guest prefill lookup — called anonymously from the booking page as the
# visitor types their phone number. Returns cached name/last-services for a
# returning guest, or null if unknown. No JWT required by design.

[functions.lookup-guest]
verify_jwt = false
